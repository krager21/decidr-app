name: decidr_app
description: A decision-making app with a spinning wheel.
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  animations: ^2.0.7
  dynamic_color: 1.7.0
  flutter_animate: ^4.2.0
  cupertino_icons: ^1.0.5
  geolocator: ^10.1.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.2
  flutter_launcher_icons: ^0.13.1

# App icon configuration
# To generate icons: flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#6750A4"  # Material 3 primary purple
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true